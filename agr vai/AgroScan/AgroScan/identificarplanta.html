<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Identificar Planta</title>
    <link rel="stylesheet" href="plantas.css">
</head>
<body>
    <div class="container center">
        <h1>🔍 Identificar Planta</h1>

        <div class="card-upload">
            <p>Envie uma imagem da planta para identificação automática</p>

            <div class="upload-box" id="uploadBox" onclick="document.getElementById('fileInput').click()">
                <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFile(this)">
                <img id="preview" style="display:none; max-width:100%; border-radius:12px;" alt="Preview">
                <div id="uploadPlaceholder">📷 Clique para enviar uma foto</div>
            </div>

            <button class="btn-main" onclick="identificar()" id="btnIdentificar" disabled>
                🔬 Identificar Planta
            </button>
        </div>

        <!-- Loading -->
        <div id="loading" style="display:none; text-align:center; margin-top:20px;">
            <p>🌿 Analisando imagem...</p>
        </div>

        <!-- Resultado -->
        <div id="resultado" style="display:none; margin-top:24px;">
            <div class="card">
                <h2 id="res-nomePopular"></h2>
                <p><strong>Nome científico:</strong> <span id="res-nomeCientifico"></span></p>
                <p><strong>Tipo:</strong> <span id="res-tipo"></span></p>
                <p><strong>Clima:</strong> <span id="res-clima"></span></p>
                <p><strong>Luminosidade:</strong> <span id="res-luminosidade"></span></p>
                <p><strong>Rega:</strong> <span id="res-rega"></span></p>
                <p><strong>Descrição:</strong> <span id="res-descricao"></span></p>

                <button class="btn-main" onclick="salvarPlanta()" id="btnSalvar">
                    💾 Salvar no banco de dados
                </button>
                <p id="msg-salvo" style="display:none; color:green; font-weight:bold; margin-top:10px;">
                    ✅ Planta salva com sucesso!
                </p>
            </div>
        </div>
    </div>

    <script>
        let imagemBase64 = null;
        let mimeType = 'image/jpeg';
        let dadosIdentificados = null;

        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            mimeType = file.type || 'image/jpeg';

            const reader = new FileReader();
            reader.onload = e => {
                imagemBase64 = e.target.result.split(',')[1];
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('uploadPlaceholder').style.display = 'none';
                document.getElementById('btnIdentificar').disabled = false;
            };
            reader.readAsDataURL(file);
        }

        async function identificar() {
            if (!imagemBase64) return;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultado').style.display = 'none';
            document.getElementById('btnIdentificar').disabled = true;

            try {
                const res = await fetch('/Groq/identificar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imagemBase64, mimeType })
                });

                if (!res.ok) throw new Error('Erro na análise');
                const data = await res.json();
                dadosIdentificados = data;

                document.getElementById('res-nomePopular').textContent = data.nomePopular || '-';
                document.getElementById('res-nomeCientifico').textContent = data.nomeCientifico || '-';
                document.getElementById('res-tipo').textContent = data.tipoPlanta || '-';
                document.getElementById('res-clima').textContent = data.clima || '-';
                document.getElementById('res-luminosidade').textContent = data.luminosidade || '-';
                document.getElementById('res-rega').textContent = data.rega || '-';
                document.getElementById('res-descricao').textContent = data.descricao || '-';

                document.getElementById('resultado').style.display = 'block';
                document.getElementById('msg-salvo').style.display = 'none';
                document.getElementById('btnSalvar').style.display = 'inline-block';

            } catch (e) {
                alert('Erro ao identificar: ' + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('btnIdentificar').disabled = false;
            }
        }

        async function salvarPlanta() {
            if (!dadosIdentificados) return;

            try {
                const res = await fetch('/Plantas', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nomeCientifico: dadosIdentificados.nomeCientifico,
                        nomePopular: dadosIdentificados.nomePopular,
                        tipoPlanta: dadosIdentificados.tipoPlanta,
                        clima: dadosIdentificados.clima,
                        luminosidade: dadosIdentificados.luminosidade,
                        rega: dadosIdentificados.rega,
                        descricao: dadosIdentificados.descricao
                    })
                });

                if (!res.ok) throw new Error('Erro ao salvar');
                document.getElementById('msg-salvo').style.display = 'block';
                document.getElementById('btnSalvar').style.display = 'none';
            } catch (e) {
                alert('Erro ao salvar: ' + e.message);
            }
        }
    </script>
</body>
</html>
