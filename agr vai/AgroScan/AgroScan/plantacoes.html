<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Plantações</title>
    <link rel="stylesheet" href="plantas.css">
</head>

<body>

    <div class="container">
        <h1>🌿 Plantações</h1>

        <div class="form">
            <input id="nomeCientifico" placeholder="Nome Científico">
            <input id="nomePopular" placeholder="Nome Popular">
            <input id="tipo" placeholder="Tipo">
            <input id="clima" placeholder="Clima">
            <input id="rega" placeholder="Rega">

            <button onclick="adicionar()">Adicionar</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Tipo</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
const API = "/Plantas";

function carregar(){
    fetch(API)
    .then(r => r.json())
    .then(data => {
        let html = "";
        data.forEach(p => {
            html += `
            <tr>
                <td>${p.nomePopular}</td>
                <td>${p.tipoPlanta}</td>
                <td>
                    <button onclick="deletar(${p.plantaId})">Excluir</button>
                </td>
            </tr>`;
        });
        document.getElementById("lista").innerHTML = html;
    });
}

function adicionar(){
    const data = {
        nomeCientifico: nomeCientifico.value,
        nomePopular: nomePopular.value,
        tipoPlanta: tipo.value,
        clima: clima.value,
        rega: rega.value
    };

    fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    }).then(() => carregar());
}

function deletar(id){
    fetch(API + "/" + id, { method: "DELETE" })
    .then(() => carregar());
}

carregar();
    </script>

</body>
</html>
