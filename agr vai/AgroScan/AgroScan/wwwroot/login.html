<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroScan · Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="auth.css" />
</head>
<body class="page-login">

    <div id="app">

        <!-- ═══════════════════════════════════════
             CÍRCULO — fica à DIREITA no login
        ═══════════════════════════════════════ -->
        <div id="circle-panel">
            <div class="circle-ring"></div>
            <div id="circle-content">
                <span class="circle-eyebrow">AgroScan · Plataforma</span>
                <h2 class="circle-headline">Inteligência<br>para o <em>campo</em></h2>
                <p class="circle-desc">Monitore suas lavouras, registre ocorrências e tome decisões baseadas em dados — de onde você estiver.</p>
                <div class="circle-pills">
                    <span class="circle-pill">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 2C5.2 2 3 4.2 3 7c0 4 5 9 5 9s5-5 5-9c0-2.8-2.2-5-5-5z" /></svg>
                        Geolocalização
                    </span>
                    <span class="circle-pill">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12l4-4 3 3 5-6" /></svg>
                        Monitoramento
                    </span>
                    <span class="circle-pill">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="2" width="10" height="12" rx="1.5" /><path d="M5 6h6M5 9h4" /></svg>
                        Relatórios
                    </span>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════
             FORMULÁRIO — fica à ESQUERDA no login
        ═══════════════════════════════════════ -->
        <div class="form-panel" id="formPanel">
            <div class="form-wrap">

                <div class="brand">
                    <div class="brand-mark">🌿</div>
                    <span class="brand-name">Agro<strong>Scan</strong></span>
                </div>

                <h1 class="form-title">Bem-vindo</h1>
                <p class="form-sub">Entre com sua conta para continuar</p>

                <div class="field">
                    <label>
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="12" height="10" rx="1.5" /><path d="M2 6h12" /></svg>
                        CPF
                    </label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="12" height="10" rx="1.5" /><path d="M2 6h12" /></svg>
                        <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="off" />
                    </div>
                </div>

                <div class="field">
                    <label>
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="7" width="8" height="7" rx="1" /><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" /></svg>
                        Senha
                    </label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="7" width="8" height="7" rx="1" /><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2" /></svg>
                        <input type="password" id="senha" placeholder="••••••••" />
                    </div>
                </div>

                <button class="btn-main" onclick="login()">
                    Entrar
                    <svg class="btn-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8h10M9 4l4 4-4 4" /></svg>
                </button>

                <p class="switch-link">
                    Não tem conta? <a href="cadastro.html" id="linkCadastro">Cadastre-se</a>
                </p>

            </div>
        </div>

    </div><!-- /#app -->

    <script>
        /* ── CPF mask ── */
        document.getElementById('cpf').addEventListener('input', function () {
            let v = this.value.replace(/\D/g, '').slice(0, 11);
            if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
            else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{0,3})/, '$1.$2.$3');
            else if (v.length > 3) v = v.replace(/(\d{3})(\d{0,3})/, '$1.$2');
            this.value = v;
        });

        window.addEventListener('DOMContentLoaded', () => {
            const from = sessionStorage.getItem('agro-from');
            sessionStorage.removeItem('agro-from');
            const form = document.getElementById('formPanel');

            if (from === 'cadastro') {
                form.classList.add('form-enter-left');
            } else {
                form.classList.add('form-enter-right');
            }

            document.getElementById('circle-content').classList.add('circle-content-reveal');
        });

        document.getElementById('linkCadastro').addEventListener('click', function (e) {
            e.preventDefault();
            sessionStorage.setItem('agro-from', 'login');
            const form = document.getElementById('formPanel');
            form.classList.add('form-exit-left');
            setTimeout(() => { window.location.href = 'cadastro.html'; }, 420);
        });

        /* ── Login API ── */
        function login() {
            const cpf = document.getElementById('cpf').value.replace(/\D/g, '');
            const senha = document.getElementById('senha').value;
            if (cpf.length !== 11) { alert('CPF inválido.'); return; }
            if (!senha) { alert('Informe a senha.'); return; }
            fetch('https://localhost:7238/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ CPF: cpf, Senha: senha })
            })
                .then(r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(d => {
                    localStorage.setItem('authenticated', 'true');
                    localStorage.setItem('userNome', d.nome || 'Usuário');
                    window.location.href = 'dashboard.html';
                })
                .catch(() => alert('CPF ou senha incorretos.'));
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
